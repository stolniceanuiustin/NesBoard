# PL310 L2 outer cache. Was disabled to isolate an earlier boot hang; re-enabled
# for performance now that CONFIG_NOCACHE_MEMORY=y handles GEM DMA coherency
# (the usual cause of PL310-related hangs on this SoC).
CONFIG_SOC_XILINX_PL310=y

# Optimize for speed — the NES core is a compute-bound interpreter, default
# -Os leaves a lot on the table.
CONFIG_SPEED_OPTIMIZATIONS=y

# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FLOAT_PRINTF=n

# Logging — IMMEDIATE so messages print synchronously instead of being queued
# for a low-priority log thread that the busy emu thread never lets run.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# ROM embedded in the firmware image at build time (see CMakeLists.txt) — no SD driver needed

# Threading
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=4096

# Heap for filesystem buffers
CONFIG_HEAP_MEM_POOL_SIZE=32768

# GPIO for NES controller
CONFIG_GPIO=y

# Random number generation (needed by network stack)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Networking - TCP framebuffer streaming (reliable, flow-controlled: no dropped
# frames, emulator paced by the link instead of overflowing TX buffers)
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=y
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=1
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.3"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"

# L2 Ethernet layer — REQUIRED. Without it the whole ethernet driver menu is
# off and CONFIG_ETH_XLNX_GEM below is silently ignored (no interface, no link).
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_XLNX_GEM=y

# Place the GEM DMA buffer-descriptor rings in non-cached RAM. The Zynq-7000
# GEM DMA does not snoop the cache, so caching the rings causes coherency
# stalls / silent hangs. (Same setting zperf uses on this board.)
CONFIG_NOCACHE_MEMORY=y

# Bulk RX/TX at 1G needs deeper network thread stacks than the default.
CONFIG_NET_TX_STACK_SIZE=65536
CONFIG_NET_RX_STACK_SIZE=65536
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=64
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=256
